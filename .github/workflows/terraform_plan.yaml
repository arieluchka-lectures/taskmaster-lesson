name: Terraform plan

on: 
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.4"

      - name: download-artifact
        uses: dawidd6/action-download-artifact@v19
        with: 
          name: terraform-state
          path: terraform
          workflow: terraform_deployment.yaml
      
      - name: terraform plan
        uses: dflook/terraform-plan@v2
        with:
          path: terraform

