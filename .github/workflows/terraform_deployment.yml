name: Terraform Automation

on:
  push:
    branches: [main]

jobs:
  print_hello_world:
    runs-on: ubuntu-latest
    steps:
      - name: Print
        run: echo "Hello World!"

      - name: Check code
        uses: actions/checkout@v4.3.1
        
      - name: debug-step
        continue-on-error: true
        run: |
          terraform --version      

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.4"

      - name: debug-step-2
        run: |
          terrafrom --version


