name: terraform destroy
on:
  workflow_dispatch:
jobs:
  destroy_runner:
    runs-on: ubuntu-latest
    steps:
      - name: grab the code
        run: git clone https://github.com/100625-Newman/taskmaster-lesson.git
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.7
      - name: download-artifacts
        uses: dawidd6/action-download-artifact@v19
        with:
          workflow: tf_deployment.yaml
          name: tf state documentation
          path: terraform/terraform.tfstate
          continue-on-error: true
      - name: set aws credentials
        run: |
          echo "setting up aws credentials"
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS }}
          export AWS_DEFAULT_REGION=us-east-1
      - name: tf destroy
        run: |
          ls -lha
          pwd
          cd terraform
          pwd
          ls -lha
          terraform init
          terraform destroy -auto-approve