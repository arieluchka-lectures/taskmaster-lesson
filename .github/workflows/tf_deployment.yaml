name: Terraform Deployment
on:
  push:
    branches: [ main ]
jobs:
  build_runner:
    runs-on: ubuntu-latest
    steps:
       - name: Checkout code
         uses: actions/checkout@v5
       - name : grab the code
         run: git clone https://github.com/100625-Newman/taskmaster-lesson.git
       - name: check file existence
         run: ls -lha
       - name: Install Terraform
         uses: hashicorp/setup-terraform@v4
         with:
           terraform_version: 1.14.7

       - name: Check terraform existence
         run: |
              echo "##################################"
              which terraform && terraform --version
              echo "##################################"
       - name: Check aws existence
         run: |
              echo "##################################"     
              which aws && aws --version
              echo "##################################"


       - name: download-artifacts
         uses: /dawidd6/action-download-artifact@v19
         with:
           name: tf state documentation
           runid: ${{ github.run_id }}
           path: taskmaster-lesson/terraform/    
       - name: set aws credentials + tf init plan apply
         run: |
           echo "setting up aws credentials"
           export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY }}
           export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS }}
           export AWS_DEFAULT_REGION=us-east-1
           echo "###################################"
           pwd
           echo "##################################"
           cd taskmaster-lesson     
           ls -lha
           cd terraform
           terraform init
           terraform plan
            terraform apply -auto-approve -replace=aws_internet_gateway.main

       - name: upload-artifacts
         uses: actions/upload-artifact@v7
         with:
           name: tf state documentation
           path: taskmaster-lesson/terraform/terraform.tfstate